<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@discoragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0507;
    --card: rgba(18, 8, 10, 0.70);
    --card-border: rgba(255, 45, 77, 0.3);
    --red: #ff2d4d;
    --red-dim: #7a0c1f;
    --red-glow: rgba(255, 45, 77, 0.35);
    --text: #f2e6e8;
    --muted: #9c7b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--red-dim); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red); }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    position: relative;
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%23ff2d4d' stroke='%230a0507' stroke-width='1.5'/><circle cx='5' cy='5' r='1' fill='%23ffffff'/></svg>"), auto;
  }

  a, button, .play-btn, .progress-slider, .social-btn, .tag, .volume-slider, #enterOverlay, .visitor-count, .fullscreen-btn, .username, .game-plaque, .corner-volume, .location, .gb-send-btn, .reaction-btn, .gb-delete-btn, .picker-emoji-opt, .admin-login-btn, .admin-logout-btn {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%23ffffff' stroke='%23ff2d4d' stroke-width='1.5'/><circle cx='5' cy='5' r='1.5' fill='%23ff2d4d'/></svg>"), pointer;
  }

  .fullscreen-btn {
    position: fixed; top: 18px; right: 18px; z-index: 100;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text); display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(20px); transition: all 0.2s ease; outline: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .fullscreen-btn:hover { background: var(--red); border-color: var(--red); box-shadow: 0 0 15px var(--red-glow); transform: scale(1.05); }
  .fullscreen-btn svg { width: 18px; height: 18px; fill: none; stroke: var(--text); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .fullscreen-btn:hover svg { stroke: #000; }

  .corner-volume {
    position: fixed; top: 18px; left: 18px; z-index: 100;
    display: flex; align-items: center; background: var(--card);
    border: 1px solid var(--card-border); border-radius: 50px;
    padding: 5px 8px 5px 5px; backdrop-filter: blur(20px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .corner-volume-btn {
    width: 30px; height: 30px; border-radius: 50%;
    background: rgba(255, 45, 77, 0.12); border: 1px solid rgba(255, 45, 77, 0.4);
    display: flex; align-items: center; justify-content: center; outline: none;
  }
  .corner-volume-btn svg { width: 13px; height: 13px; fill: var(--text); }
  .corner-volume-slider-wrap { max-width: 0; opacity: 0; overflow: hidden; transition: max-width 0.3s, opacity 0.2s; display: flex; align-items: center; }
  .corner-volume:hover .corner-volume-slider-wrap { max-width: 90px; opacity: 1; margin-left: 8px; }
  .volume-slider { width: 80px; height: 4px; -webkit-appearance: none; background: rgba(255, 255, 255, 0.15); border-radius: 2px; outline: none; }
  .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--red); cursor: pointer; }

  .main-container { max-width: 900px; width: 100%; z-index: 50; }

  .profile-section {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 8px;
    padding: 24px; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); margin-bottom: 20px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
  }
  .profile-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--red), #ff7700, var(--red));
    display: flex; align-items: center; justify-content: center; font-size: 50px; flex-shrink: 0;
  }
  .username {
    font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 8px;
    background: linear-gradient(135deg, var(--red), #ff7700); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .user-status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; }
  .status-dot.offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
  .status-text { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .user-location { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .social-btn {
    padding: 8px 16px; border-radius: 4px; border: 1px solid var(--card-border);
    background: rgba(255, 45, 77, 0.08); color: var(--text); text-decoration: none; font-size: 12px; transition: all 0.2s ease;
  }
  .social-btn:hover { background: var(--red); border-color: var(--red); }

  .activity-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .activity-card { background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; padding: 16px; text-align: center; backdrop-filter: blur(20px); }
  .activity-value { font-size: 24px; font-weight: 700; color: var(--red); margin-bottom: 4px; }
  .activity-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

  .guestbook-section { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 24px; backdrop-filter: blur(20px); }
  .gb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .gb-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  
  .admin-panel { display: flex; gap: 8px; align-items: center; }
  .admin-status { font-size: 11px; color: #10b981; background: rgba(16, 185, 129, 0.1); padding: 4px 10px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.3); display: flex; align-items: center; gap: 4px; }
  .admin-status.hidden { display: none; }
  .admin-login-btn, .admin-logout-btn { padding: 6px 12px; font-size: 11px; border-radius: 4px; border: 1px solid var(--card-border); background: rgba(255, 45, 77, 0.12); color: var(--text); text-transform: uppercase; }
  .admin-logout-btn { background: rgba(16, 185, 129, 0.12); color: #10b981; }
  .admin-logout-btn.hidden, .admin-login-btn.hidden { display: none; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--card); border: 1px solid var(--card-border); border-radius: 8px; padding: 32px; max-width: 320px; width: 90%; }
  .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
  .modal-input { width: 100%; padding: 10px 12px; background: rgba(255, 45, 77, 0.08); border: 1px solid var(--card-border); border-radius: 4px; color: var(--text); font-size: 14px; margin-bottom: 16px; outline: none; }
  .modal-buttons { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 10px; border-radius: 4px; border: 1px solid var(--card-border); background: rgba(255, 45, 77, 0.12); color: var(--text); cursor: pointer; }
  .modal-btn-cancel { background: rgba(100, 100, 100, 0.2); }

  .gb-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
  #gbInput { flex: 1; padding: 10px 12px; background: rgba(255, 45, 77, 0.08); border: 1px solid var(--card-border); border-radius: 4px; color: var(--text); outline: none; }
  .gb-send-btn { padding: 10px 16px; background: var(--red); border: none; border-radius: 4px; color: #000; font-weight: 600; cursor: pointer; text-transform: uppercase; }

  #gbMessages { display: flex; flex-direction: column; gap: 12px; max-height: 500px; overflow-y: auto; padding-right: 8px; }
  .gb-msg { display: flex; gap: 12px; padding: 12px; background: rgba(255, 45, 77, 0.05); border: 1px solid rgba(255, 45, 77, 0.15); border-radius: 6px; }
  .gb-avatar { width: 36px; height: 36px; border-radius: 50%; background: conic-gradient(from 0deg, var(--red), #ff7700); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; flex-shrink: 0; }
  .gb-content { flex: 1; min-width: 0; }
  .gb-user-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .gb-author { font-weight: 600; color: var(--red); font-size: 13px; }
  .gb-time { font-size: 11px; color: var(--muted); }
  .gb-delete-btn { margin-left: auto; padding: 4px 8px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 3px; color: #ef4444; font-size: 11px; cursor: pointer; }
  .gb-text { color: var(--text); font-size: 13px; margin-bottom: 8px; word-wrap: break-word; }
  
  .gb-reactions { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .reaction-btn { padding: 4px 8px; background: rgba(255, 45, 77, 0.15); border: 1px solid rgba(255, 45, 77, 0.3); border-radius: 3px; color: var(--text); font-size: 12px; cursor: pointer; }
  .reaction-btn span { margin-left: 4px; font-size: 10px; color: var(--muted); }
  
  .emoji-picker-container { position: relative; }
  .emoji-picker-popup { position: absolute; bottom: 100%; left: 0; background: var(--card); border: 1px solid var(--card-border); border-radius: 6px; padding: 6px; display: flex; gap: 4px; flex-wrap: wrap; width: 150px; max-height: 0; opacity: 0; overflow: hidden; transition: all 0.2s; pointer-events: none; margin-bottom: 4px; }
  .emoji-picker-popup.show { max-height: 200px; opacity: 1; pointer-events: auto; }
  .picker-emoji-opt { width: 28px; height: 28px; background: rgba(255, 45, 77, 0.15); border: 1px solid rgba(255, 45, 77, 0.3); border-radius: 3px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

  .error-toast { position: fixed; bottom: 20px; left: 20px; background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 4px; padding: 12px 16px; color: #ef4444; font-size: 12px; opacity: 0; transform: translateY(20px); transition: all 0.3s; z-index: 1001; pointer-events: none; }
  .error-toast.show { opacity: 1; transform: translateY(0); }
</style>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="adminLoginModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">🔐 Вход в админ-панель</div>
    <input type="password" id="adminPassword" class="modal-input" placeholder="Введите пароль..." />
    <div class="modal-buttons">
      <button class="modal-btn" onclick="submitAdminLogin()">Вход</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">Отмена</button>
    </div>
  </div>
</div>

<div id="errorToast" class="error-toast"></div>

<div class="main-container">
  <div class="profile-section">
    <div class="profile-avatar">🎮</div>
    <div class="profile-info" style="flex:1;">
      <div class="username">@discoragen</div>
      <div class="user-status">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text">Online</span>
      </div>
      <div class="user-location">Yekaterinburg 🔴</div>
      <div class="social-links">
        <a href="https://t.me/Discoragen" class="social-btn">Telegram</a>
      </div>
    </div>
  </div>

  <div class="activity-section">
    <div class="activity-card">
      <div class="activity-value" id="visitorCount">506</div>
      <div class="activity-label">Посетители</div>
    </div>
    <div class="activity-card">
      <div class="activity-value">24</div>
      <div class="activity-label">Часов на сайте</div>
    </div>
    <div class="activity-card">
      <div class="activity-value" id="coolinessLevel">100</div>
      <div class="activity-label">Крутизна уровня</div>
    </div>
  </div>

  <div class="guestbook-section">
    <div class="gb-header">
      <div class="gb-title">💬 Гостевая Книга</div>
      <div class="admin-panel">
        <div class="admin-status hidden" id="adminStatus"><span>✓</span> Администратор</div>
        <button class="admin-login-btn" id="adminLoginBtn" onclick="openAdminModal()">🔓 Вход</button>
        <button class="admin-logout-btn hidden" id="adminLogoutBtn" onclick="logoutAdmin()">🔒 Выход</button>
      </div>
    </div>

    <div class="gb-input-row">
      <input type="text" id="gbInput" class="gb-input" placeholder="Напишите сообщение..." maxlength="200" />
      <button class="gb-send-btn" id="gbSendBtn" onclick="postMessage()">Отправить</button>
    </div>

    <div id="gbMessages"></div>
  </div>
</div>

<script>
  // Конфигурация Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDcgAxaEm0rKEbfL597920nX4fqgyD3BdE",
    authDomain: "guestbook-site-5b1ab.firebaseapp.com",
    projectId: "guestbook-site-5b1ab",
    storageBucket: "guestbook-site-5b1ab.firebasestorage.app",
    messagingSenderId: "593355741478",
    appId: "1:593355741478:web:472142384f1347cbabc9e7"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const ADMIN_PASSWORD = 'nlez754.1998201020';
  let isAdmin = localStorage.getItem('discoragen_admin') === 'true';

  const adminLoginModal = document.getElementById('adminLoginModal');
  const adminPassword = document.getElementById('adminPassword');
  const adminStatus = document.getElementById('adminStatus');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');
  const errorToast = document.getElementById('errorToast');
  const coolinessLevel = document.getElementById('coolinessLevel');

  if (isAdmin) {
    adminStatus.classList.remove('hidden');
    adminLoginBtn.classList.add('hidden');
    adminLogoutBtn.classList.remove('hidden');
    coolinessLevel.textContent = '∞';
  }

  function openAdminModal() { adminLoginModal.classList.add('show'); adminPassword.focus(); }
  function closeAdminModal() { adminLoginModal.classList.remove('show'); adminPassword.value = ''; }

  window.submitAdminLogin = function() {
    if (adminPassword.value === ADMIN_PASSWORD) {
      isAdmin = true;
      localStorage.setItem('discoragen_admin', 'true');
      adminStatus.classList.remove('hidden');
      adminLoginBtn.classList.add('hidden');
      adminLogoutBtn.classList.remove('hidden');
      coolinessLevel.textContent = '∞';
      closeAdminModal();
      loadMessages();
      showToast('Добро пожаловать, администратор! 🔓');
    } else {
      showToast('❌ Неверный пароль!');
      adminPassword.value = '';
    }
  };

  window.logoutAdmin = function() {
    isAdmin = false;
    localStorage.removeItem('discoragen_admin');
    adminStatus.classList.add('hidden');
    adminLoginBtn.classList.remove('hidden');
    adminLogoutBtn.classList.add('hidden');
    coolinessLevel.textContent = '100';
    loadMessages();
    showToast('Вы вышли из админ-панели');
  };

  function showToast(msg) {
    errorToast.textContent = msg;
    errorToast.classList.add('show');
    setTimeout(() => errorToast.classList.remove('show'), 3000);
  }

  // Безопасная загрузка сообщений с сортировкой на стороне клиента
  const gbMessagesContainer = document.getElementById('gbMessages');
  
  function loadMessages() {
    db.collection('messages').onSnapshot((snapshot) => {
      gbMessagesContainer.innerHTML = '';
      const messagesList = [];
      
      snapshot.forEach((doc) => {
        messagesList.push({ id: doc.id, ...doc.data() });
      });

      messagesList.sort((a, b) => {
        const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
        const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
        return timeA - timeB;
      });

      messagesList.forEach((msg) => {
        renderMessage(msg);
      });
      
      gbMessagesContainer.scrollTop = gbMessagesContainer.scrollHeight;
    });
  }

  function renderMessage(msg) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'gb-msg';

    let reactionsHTML = '';
    if (msg.reactions) {
      for (const [emoji, count] of Object.entries(msg.reactions)) {
        reactionsHTML += `<button class="reaction-btn" onclick="handleReaction('${msg.id}', '${emoji}')">${emoji} <span>${count}</span></button>`;
      }
    }

    const deleteBtn = isAdmin ? `<button class="gb-delete-btn" onclick="deleteMessage('${msg.id}')">🗑️ Удалить</button>` : '';

    msgDiv.innerHTML = `
      <div class="gb-avatar">${(msg.author || 'G').charAt(0).toUpperCase()}</div>
      <div class="gb-content">
        <div class="gb-user-row">
          <span class="gb-author">${escapeHtml(msg.author || 'guest')}</span>
          <span class="gb-time">${msg.time || 'Только что'}</span>
          ${deleteBtn}
        </div>
        <div class="gb-text">${escapeHtml(msg.text || '')}</div>
        <div class="gb-reactions">
          ${reactionsHTML}
          <div class="emoji-picker-container">
            <button class="reaction-btn" onclick="togglePicker('${msg.id}')">➕</button>
            <div class="emoji-picker-popup" id="picker-${msg.id}">
              <button class="picker-emoji-opt" onclick="selectEmoji('${msg.id}', '👍')">👍</button>
              <button class="picker-emoji-opt" onclick="selectEmoji('${msg.id}', '❤️')">❤️</button>
              <button class="picker-emoji-opt" onclick="selectEmoji('${msg.id}', '🔥')">🔥</button>
              <button class="picker-emoji-opt" onclick="selectEmoji('${msg.id}', '💀')">💀</button>
              <button class="picker-emoji-opt" onclick="selectEmoji('${msg.id}', '🚀')">🚀</button>
            </div>
          </div>
        </div>
      </div>
    `;
    gbMessagesContainer.appendChild(msgDiv);
  }

  function escapeHtml(text) {
    return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  window.togglePicker = function(id) {
    document.querySelectorAll('.emoji-picker-popup').forEach(p => {
      if (p.id !== `picker-${id}`) p.classList.remove('show');
    });
    const picker = document.getElementById(`picker-${id}`);
    if (picker) picker.classList.toggle('show');
  };

  window.selectEmoji = function(id, emoji) {
    const msgRef = db.collection('messages').doc(id);
    db.runTransaction(async (transaction) => {
      const doc = await transaction.get(msgRef);
      if (!doc.exists) return;
      const reactions = doc.data().reactions || {};
      reactions[emoji] = (reactions[emoji] || 0) + 1;
      transaction.update(msgRef, { reactions });
    });
  };

  window.handleReaction = function(id, emoji) {
    window.selectEmoji(id, emoji);
  };

  window.deleteMessage = function(id) {
    if (!isAdmin) {
      showToast('❌ Недостаточно прав!');
      return;
    }
    db.collection('messages').doc(id).delete().then(() => {
      showToast('✓ Сообщение удалено');
    });
  };

  window.postMessage = function() {
    const gbInput = document.getElementById('gbInput');
    const text = gbInput.value.trim();
    if (!text) return;

    const randomNames = ['guest_99', 'cyber_user', 'anon_1337', 'player_one', 'user_52', 'visitor'];
    const author = randomNames[Math.floor(Math.random() * randomNames.length)];

    db.collection('messages').add({
      author: author,
      text: text,
      time: 'Только что',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: { '👍': 1 }
    }).then(() => {
      gbInput.value = '';
    });
  };

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker-container')) {
      document.querySelectorAll('.emoji-picker-popup').forEach(p => p.classList.remove('show'));
    }
  });

  document.getElementById('gbInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') postMessage();
  });

  loadMessages();
</script>
</body>
</html>
