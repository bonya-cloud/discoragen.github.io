<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — @discoragen</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { background: #0a0507; color: #f2e6e8; font-family: 'Inter', sans-serif; padding: 30px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-family: 'Space Grotesk', sans-serif; color: #ff2d4d; margin-bottom: 8px; }
  .subtitle { font-size: 13px; color: #9c7b80; margin-bottom: 20px; }
  .panel-box { width: 100%; max-width: 600px; background: rgba(18, 8, 10, 0.8); border: 1px solid rgba(255, 45, 77, 0.3); border-radius: 16px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .msg-item { display: flex; justify-content: space-between; align-items: center; background: #2b2d31; padding: 12px 16px; border-radius: 8px; margin-bottom: 10px; }
  .msg-info { display: flex; flex-direction: column; gap: 4px; }
  .msg-author { font-weight: bold; color: #fff; font-size: 14px; }
  .msg-text { font-size: 13px; color: #dbdee1; }
  .delete-btn { background: #f04747; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
  .delete-btn:hover { background: #d83c3c; }
  .profile-link { margin-top: 20px; color: #ff2d4d; text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 16px; background: rgba(255,45,77,0.1); border: 1px solid rgba(255,45,77,0.3); border-radius: 8px; transition: all 0.2s; }
  .profile-link:hover { background: rgba(255,45,77,0.2); border-color: #ff2d4d; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h1>🔒 Admin Control Panel</h1>
  <div class="subtitle">Управление гостевой книгой сайта</div>
  
  <div class="panel-box" id="adminMessagesList">
    <p style="color: #9c7b80;">Загрузка сообщений...</p>
  </div>
  
  <a href="https://discoragen.github.io/profile/" target="_blank" class="profile-link">🌐 Открыть публичный профиль в новой вкладке</a>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDcgAxaEm0rKEbfL597920nX4fqgyD3BdE",
      authDomain: "guestbook-site-5b1ab.firebaseapp.com",
      projectId: "guestbook-site-5b1ab",
      storageBucket: "guestbook-site-5b1ab.firebasestorage.app",
      messagingSenderId: "593355741478",
      appId: "1:593355741478:web:472142384f1347cbabc9e7"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const listEl = document.getElementById('adminMessagesList');

    db.collection('messages').onSnapshot((snapshot) => {
      listEl.innerHTML = '';
      if(snapshot.empty) {
        listEl.innerHTML = '<p style="color: #9c7b80;">Сообщений пока нет.</p>';
        return;
      }
      snapshot.forEach((doc) => {
        const data = doc.data();
        const item = document.createElement('div');
        item.className = 'msg-item';
        item.innerHTML = `
          <div class="msg-info">
            <span class="msg-author">${escapeHtml(data.author)}</span>
            <span class="msg-text">${escapeHtml(data.text)}</span>
          </div>
          <button class="delete-btn" onclick="deleteMsg('${doc.id}')">Удалить</button>
        `;
        listEl.appendChild(item);
      });
    });

    window.deleteMsg = (id) => {
      db.collection('messages').doc(id).delete();
    };

    function escapeHtml(str) { return String(str || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
  </script>
</body>
</html>
