<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@discoragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Подключаем Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #2b2d31;
    --card: rgba(43, 45, 49, 0.85);
    --card-border: rgba(255, 255, 255, 0.1);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-dim: #1e3a8a;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --danger: #ef4444;
    --danger-bg: rgba(239, 68, 68, 0.12);
    --text: #f3f4f6;
    --muted: #9ca3af;
    --input-bg: rgba(0, 0, 0, 0.25);
  }

  body.light-theme {
    --bg: #f0f2f5;
    --card: rgba(255, 255, 255, 0.85);
    --card-border: rgba(0, 0, 0, 0.1);
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --accent-dim: #dbeafe;
    --accent-glow: rgba(37, 99, 235, 0.2);
    --danger: #dc2626;
    --danger-bg: rgba(220, 38, 38, 0.1);
    --text: #1f2937;
    --muted: #6b7280;
    --input-bg: rgba(0, 0, 0, 0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: #3f4147;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    position: relative;
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%233b82f6' stroke='%232b2d31' stroke-width='1.5'/><circle cx='5' cy='5' r='1' fill='%23ffffff'/></svg>"), auto;
    transition: background 0.3s ease, color 0.3s ease;
  }

  a, button, .play-btn, .progress-slider, .sort-select, .social-btn, .tag, .volume-slider, #enterOverlay, .visitor-count, .nav-btn, .dropdown-item, .username, .game-plaque, .corner-volume, .location, .gb-send-btn, .reaction-btn, .gb-delete-btn, .gb-pin-btn, .picker-emoji-opt, .admin-login-btn, .admin-logout-btn, .site-logo {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%23ffffff' stroke='%233b82f6' stroke-width='1.5'/><circle cx='5' cy='5' r='1.5' fill='%233b82f6'/></svg>"), pointer;
  }

  /* Логотип-котик слева сверху */
  .site-logo {
    position: fixed;
    top: 25px;
    left: max(16px, calc(50% - 510px));
    z-index: 100;
    background: none;
    border: none;
    padding: 0;
    outline: none;
    display: flex;
    align-items: center;
    transition: transform 0.2s ease;
  }

  .site-logo img {
    height: 52px;
    width: auto;
    object-fit: contain;
    border-radius: 0;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
  }

  .site-logo:hover {
    transform: scale(1.08);
  }

  /* ПРАВАЯ ВЕРХНЯЯ ПАНЕЛЬ И ДРОПДАУН */
  .top-right-controls {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(20px);
    transition: all 0.2s ease;
    outline: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }

  .nav-btn:hover {
    background: rgba(150, 150, 150, 0.15);
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-glow);
    transform: scale(1.05);
  }

  .nav-btn svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: var(--text);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s ease;
  }

  .nav-btn:hover svg {
    stroke: var(--accent);
  }

  /* Выделенная кнопка профиля */
  .profile-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #ffffff;
  }

  .profile-btn svg {
    stroke: #ffffff;
  }

  .profile-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
  }
  
  .profile-btn:hover svg {
    stroke: #ffffff;
  }

  .profile-dropdown-container {
    position: relative;
  }

  .profile-dropdown {
    position: absolute;
    top: calc(100% + 12px);
    right: 0;
    width: 220px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 8px 0;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    backdrop-filter: blur(20px);
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.2s ease;
  }

  .profile-dropdown.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .dropdown-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px 12px 16px;
  }

  .dropdown-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .dropdown-avatar svg {
    width: 18px;
    height: 18px;
    stroke: #ffffff;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dropdown-username {
    font-weight: 600;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Grotesk', sans-serif;
  }

  .dropdown-divider {
    height: 1px;
    background: var(--card-border);
    margin: 4px 0;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .dropdown-item svg {
    width: 16px;
    height: 16px;
    stroke: var(--muted);
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s ease;
  }

  .dropdown-item:hover {
    background: rgba(150, 150, 150, 0.1);
    color: var(--accent);
  }

  .dropdown-item:hover svg {
    stroke: var(--accent);
  }

  .dropdown-item.logout {
    color: var(--danger);
  }

  .dropdown-item.logout svg {
    stroke: var(--danger);
  }

  .dropdown-item.logout:hover {
    background: var(--danger-bg);
  }

  /* ОСНОВНОЙ КОНТЕЙНЕР И ПРОФИЛЬ (старые стили) */
  .main-container {
    max-width: 900px;
    width: 100%;
    z-index: 50;
    margin-top: 40px; /* Отступ от верхних кнопок */
  }

  .profile-section {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    margin-bottom: 20px;
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .profile-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
  }

  .profile-info {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .profile-avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), #60a5fa, var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
    overflow: hidden;
  }

  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .username {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .user-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 10px #10b981;
    transition: all 0.3s ease;
  }

  .status-dot.offline {
    background: #ef4444;
    box-shadow: 0 0 10px #ef4444;
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .user-location {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .social-links {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .social-btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.08);
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .social-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 15px var(--accent-glow);
    color: #ffffff;
  }

  .activity-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .activity-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    backdrop-filter: blur(20px);
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .activity-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .activity-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .guestbook-section {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    transition: background 0.3s ease, border-color 0.3s ease;
  }

  .gb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .gb-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .gb-controls-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    justify-content: space-between;
    flex-wrap: wrap;
  }

  .sort-select {
    background: var(--input-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    transition: all 0.2s ease;
  }

  .sort-select option {
    background: var(--bg);
    color: var(--text);
    padding: 6px;
  }

  .sort-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .admin-panel {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .user-status-badge {
    font-size: 11px;
    color: var(--muted);
    background: rgba(150, 150, 150, 0.1);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .user-status-badge.hidden {
    display: none;
  }

  .admin-status {
    font-size: 11px;
    color: #10b981;
    background: rgba(16, 185, 129, 0.1);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .admin-status.hidden {
    display: none;
  }

  .admin-login-btn, .admin-logout-btn {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.12);
    color: var(--text);
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .admin-login-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    color: #ffffff;
  }

  .admin-logout-btn {
    background: rgba(16, 185, 129, 0.12);
    border-color: rgba(16, 185, 129, 0.3);
    color: #10b981;
  }

  .admin-logout-btn:hover {
    background: rgba(16, 185, 129, 0.25);
  }

  .admin-logout-btn.hidden {
    display: none;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 32px;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal-input {
    width: 100%;
    padding: 10px 12px;
    background: var(--input-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: all 0.2s ease;
  }

  .modal-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .modal-buttons {
    display: flex;
    gap: 8px;
  }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.15);
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .modal-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    color: #ffffff;
  }

  .modal-btn-cancel {
    background: rgba(100, 100, 100, 0.2);
  }

  .modal-btn-cancel:hover {
    background: rgba(100, 100, 100, 0.4);
    border-color: var(--muted);
    color: var(--text);
    box-shadow: none;
  }

  .gb-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  #gbInput {
    flex: 1;
    padding: 10px 12px;
    background: var(--input-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: all 0.2s ease;
  }

  #gbInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .gb-send-btn {
    padding: 10px 20px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: #ffffff;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .gb-send-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 0 15px var(--accent-glow);
    transform: translateY(-1px);
  }

  #gbMessages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 500px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .gb-msg {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: rgba(150, 150, 150, 0.02);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  .gb-msg.admin-post-style {
    background: rgba(59, 130, 246, 0.05);
    border: 1px solid rgba(59, 130, 246, 0.25);
  }

  .gb-msg.pinned-msg-style {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.4);
    box-shadow: 0 0 15px rgba(245, 158, 11, 0.15);
  }

  .gb-msg.admin-post-style .gb-avatar {
    background: conic-gradient(from 0deg, var(--accent), #60a5fa);
    color: #ffffff;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .gb-msg.admin-post-style .gb-author {
    color: var(--accent);
  }

  .admin-badge {
    background: var(--accent);
    color: #ffffff;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    box-shadow: 0 0 10px var(--accent-glow);
    display: inline-block;
  }

  .pinned-badge {
    background: #f59e0b;
    color: #ffffff;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
    display: inline-block;
  }

  .gb-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(150, 150, 150, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
  }

  .gb-content {
    flex: 1;
    min-width: 0;
  }

  .gb-user-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .gb-author {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
  }

  .gb-time {
    font-size: 11px;
    color: var(--muted);
    cursor: help;
  }

  .gb-delete-btn, .gb-pin-btn {
    padding: 4px 8px;
    border-radius: 3px;
    font-size: 11px;
    transition: all 0.2s ease;
  }

  .gb-delete-btn {
    margin-left: auto;
    background: var(--danger-bg);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--danger);
  }

  .gb-delete-btn:hover {
    background: var(--danger);
    color: #ffffff;
  }

  .gb-pin-btn {
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: #f59e0b;
  }

  .gb-pin-btn:hover {
    background: #f59e0b;
    color: #ffffff;
  }

  .gb-delete-btn.hidden, .gb-pin-btn.hidden {
    display: none;
  }

  .gb-text {
    color: var(--text);
    font-size: 13px;
    margin-bottom: 8px;
    word-wrap: break-word;
  }

  .gb-reactions {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .reaction-btn {
    padding: 4px 8px;
    background: rgba(150, 150, 150, 0.05);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .reaction-btn:hover {
    background: rgba(59, 130, 246, 0.15);
    border-color: var(--accent);
  }

  .reaction-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #ffffff;
  }

  .reaction-btn span {
    margin-left: 4px;
    font-size: 10px;
    color: var(--muted);
  }

  .emoji-picker-container {
    position: relative;
  }

  .emoji-picker-popup {
    position: absolute;
    bottom: 100%;
    left: 0;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    width: 150px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: all 0.2s ease;
    pointer-events: none;
    margin-bottom: 4px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .emoji-picker-popup.show {
    max-height: 200px;
    opacity: 1;
    pointer-events: auto;
  }

  .picker-emoji-opt {
    width: 28px;
    height: 28px;
    background: rgba(150, 150, 150, 0.05);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;

  .picker-emoji-opt:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .error-toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 12px 16px;

    transition: all 0.3s ease;
    z-index: 1001;

  }

  .error-toast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  @media (max-width: 1050px) {

      display: none;

  @media (max-width: 600px) {
    body { padding: 20px 12px; }

  }
</style>
</head>

<script>
  // УПРАВЛЕНИЕ ДРОПДАУНОМ
  const profileMenuBtn = document.getElementById('profileMenuBtn');
  const profileDropdown = document.getElementById('profileDropdown');

  profileMenuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    profileDropdown.classList.toggle('show');
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.profile-dropdown-container')) {
      profileDropdown.classList.remove('show');
    }
  });

  // ТЕМА (СВЕТЛАЯ / ТЕМНАЯ)
  const themeToggleBtn = document.getElementById('themeToggleBtn');
  const sunIcon = document.getElementById('sunIcon');
  const moonIcon = document.getElementById('moonIcon');

  function setTheme(isLight) {
    if (isLight) {
      document.body.classList.add('light-theme');
      sunIcon.style.display = 'block';
      moonIcon.style.display = 'none';
      localStorage.setItem('discoragen_theme', 'light');
    } else {
      document.body.classList.remove('light-theme');
      sunIcon.style.display = 'none';
      moonIcon.style.display = 'block';
      localStorage.setItem('discoragen_theme', 'dark');
    }
  }

  if (localStorage.getItem('discoragen_theme') === 'light') {
    setTheme(true);
  }

  themeToggleBtn.addEventListener('click', () => {
    const isLight = !document.body.classList.contains('light-theme');
    setTheme(isLight);
  });

  // ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyDcgAxaEm0rKEbfL597920nX4fqgyD3BdE",
    authDomain: "guestbook-site-5b1ab.firebaseapp.com",
    projectId: "guestbook-site-5b1ab",
    storageBucket: "guestbook-site-5b1ab.firebasestorage.app",
    messagingSenderId: "593355741478",
    appId: "1:593355741478:web:472142384f1347cbabc9e7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const ADMIN_PASSWORD = 'nlez754.1998201020';
  let isAdmin = false;
  let currentMessagesList = []; 

  const adminLoginModal = document.getElementById('adminLoginModal');
  const adminPassword = document.getElementById('adminPassword');
  const adminStatus = document.getElementById('adminStatus');
  const userStatusBadge = document.getElementById('userStatusBadge');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');
  const errorToast = document.getElementById('errorToast');
  const totalCommentsCountEl = document.getElementById('totalCommentsCount');
  const topCommenterEl = document.getElementById('topCommenter');
  const gbMessagesContainer = document.getElementById('gbMessages');
  const gbInput = document.getElementById('gbInput');
  const gbSendBtn = document.getElementById('gbSendBtn');
  const sortSelect = document.getElementById('sortSelect');
  const usernameEl = document.getElementById('usernameEl');

  function updateAuthUI() {
    if (usernameEl) {
      usernameEl.textContent = isAdmin ? '@discoragen' : 'Suggestion (Предложка)';
    }
    if (isAdmin) {
      adminStatus.classList.remove('hidden');
      userStatusBadge.classList.add('hidden');
      adminLoginBtn.classList.add('hidden');
      adminLogoutBtn.classList.remove('hidden');
    } else {
      adminStatus.classList.add('hidden');
      userStatusBadge.classList.remove('hidden');
      adminLoginBtn.classList.remove('hidden');
      adminLogoutBtn.classList.add('hidden');
    }
    sortAndRender();
    updateActivityStats();
  }

  if (localStorage.getItem('discoragen_admin') === 'true') {
    isAdmin = true;
  }
  updateAuthUI();

  window.openAdminModal = () => { adminLoginModal.classList.add('show'); adminPassword.focus(); };
  window.closeAdminModal = () => { adminLoginModal.classList.remove('show'); adminPassword.value = ''; };

  window.submitAdminLogin = function() {
    if (adminPassword.value === ADMIN_PASSWORD) {
      isAdmin = true;
      localStorage.setItem('discoragen_admin', 'true');
      updateAuthUI();
      closeAdminModal();
      showToast('Добро пожаловать, администратор! 🔓');
    } else {
      showToast('❌ Неверный пароль!');
      adminPassword.value = '';
    }
  };

  window.logoutAdmin = function() {
    isAdmin = false;
    localStorage.removeItem('discoragen_admin');
    updateAuthUI();
    showToast('Вы вышли из админ-панели');
  };

  function showToast(message) {
    errorToast.textContent = message;
    errorToast.classList.add('show');
    setTimeout(() => errorToast.classList.remove('show'), 3000);
  }

  function formatMessageTime(createdAt) {
    if (!createdAt) return { display: 'Только что', tooltip: '' };
    const date = createdAt.toDate();
    const now = new Date();

    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();

    const timeStr = `${hours}:${minutes}`;
    const dateStr = `${day}.${month}.${year}`;
    const tooltip = `${timeStr} ${dateStr}`;

    const isToday = date.toDateString() === now.toDateString();
    const yesterday = new Date(now);
    yesterday.setDate(now.getDate() - 1);
    const isYesterday = date.toDateString() === yesterday.toDateString();

    let display = '';
    if (isToday) {
      display = `сегодня в ${timeStr}`;
    } else if (isYesterday) {
      display = `вчера в ${timeStr}`;
    } else {
      display = `${dateStr} в ${timeStr}`;
    }

    return { display, tooltip };
  }

  function updateActivityStats() {
    const totalCount = currentMessagesList.length;
    if (totalCommentsCountEl) {
      totalCommentsCountEl.textContent = totalCount;
    }

    const counts = {};
    currentMessagesList.forEach(msg => {
      if (msg.author) {
        counts[msg.author] = (counts[msg.author] || 0) + 1;
      }
    });

    let topUser = '—';
    let maxCount = 0;
    for (const [user, count] of Object.entries(counts)) {
      if (count > maxCount) {
        maxCount = count;
        topUser = user;
      }
    }

    if (topCommenterEl) {
      topCommenterEl.textContent = topUser !== '—' ? `${topUser} (${maxCount})` : '—';
    }
  }

  function getTotalReactions(reactions) {
    if (!reactions) return 0;
    return Object.values(reactions).reduce((a, b) => a + b, 0);
  }

  db.collection('messages').onSnapshot((snapshot) => {
    currentMessagesList = [];
    snapshot.forEach(doc => {
      currentMessagesList.push({ id: doc.id, ...doc.data() });
    });
    updateActivityStats();
    sortAndRender();
  });

  if (sortSelect) {
    sortSelect.addEventListener('change', () => {
      sortAndRender();
    });
  }

  function sortAndRender() {
    const sortVal = sortSelect ? sortSelect.value : 'newest';

    currentMessagesList.sort((a, b) => {
      if (a.isPinned && !b.isPinned) return -1;
      if (!a.isPinned && b.isPinned) return 1;

      const timeA = a.createdAt?.toMillis() || 0;
      const timeB = b.createdAt?.toMillis() || 0;
      const popA = getTotalReactions(a.reactions);
      const popB = getTotalReactions(b.reactions);

      if (sortVal === 'newest') {
        return timeB - timeA;
      } else if (sortVal === 'oldest') {
        return timeA - timeB;
      } else if (sortVal === 'popular') {
        if (popB !== popA) return popB - popA;
        return timeB - timeA;
      }
      return timeB - timeA;
    });

    renderGuestbook();
  }

  function renderGuestbook() {
    gbMessagesContainer.innerHTML = '';
    currentMessagesList.forEach((msg) => {
      const msgDiv = document.createElement('div');
      
      const isAdminPost = msg.isAdminPost === true;
      const isPinned = msg.isPinned === true;

      if (isPinned) {
        msgDiv.className = 'gb-msg pinned-msg-style';
      } else if (isAdminPost) {
        msgDiv.className = 'gb-msg admin-post-style';
      } else {
        msgDiv.className = 'gb-msg';
      }

      let reactionsHTML = '';
      if (msg.reactions) {
        for (const [emoji, count] of Object.entries(msg.reactions)) {
          const voteKey = `voted_${msg.id}_${emoji}`;
          const isMyVote = localStorage.getItem(voteKey) === 'true';
          const activeClass = isMyVote ? 'reaction-btn active' : 'reaction-btn';
          reactionsHTML += `<button class="${activeClass}" onclick="handleReaction('${msg.id}', '${emoji}')">${emoji} <span>${count}</span></button>`;
        }
      }

      const deleteButtonHTML = isAdmin ? `<button class="gb-delete-btn" onclick="deleteMessage('${msg.id}', ${isPinned})" title="Удалить сообщение">🗑️ Удалить</button>` : '';
      const pinButtonHTML = isAdmin ? `<button class="gb-pin-btn" onclick="togglePin('${msg.id}', ${!isPinned})" title="${isPinned ? 'Открепить' : 'Закрепить'}">${isPinned ? '📍 Открепить' : '📌 Закрепить'}</button>` : '';
      
      let badgesHTML = '';
      if (isPinned) badgesHTML += `<span class="pinned-badge">📌 ЗАКРЕПЛЕНО</span>`;
      if (isAdminPost && !isPinned) badgesHTML += `<span class="admin-badge">👑 ADMIN</span>`;
      
      const avatarContent = isPinned ? '📌' : (isAdminPost ? '👑' : (msg.author || 'A')[0].toUpperCase());
      const timeInfo = formatMessageTime(msg.createdAt);

      msgDiv.innerHTML = `
        <div class="gb-avatar">${avatarContent}</div>
        <div class="gb-content">
          <div class="gb-user-row">
            <span class="gb-author">${escapeHtml(msg.author)}</span>
            ${badgesHTML}
            <span class="gb-time" title="${timeInfo.tooltip}">${timeInfo.display}</span>
            ${pinButtonHTML}
            ${deleteButtonHTML}
          </div>
          <div class="gb-text">${escapeHtml(msg.text)}</div>
          <div class="gb-reactions">
            ${reactionsHTML}
            <div class="emoji-picker-container">
              <button class="reaction-btn" onclick="togglePicker('${msg.id}')">➕</button>
              <div class="emoji-picker-popup" id="picker-${msg.id}">
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '👍')">👍</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '❤️')">❤️</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '🔥')">🔥</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '💀')">💀</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '🚀')">🚀</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '⭐')">⭐</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '💯')">💯</button>
              </div>
            </div>
          </div>
        </div>
      `;
      gbMessagesContainer.appendChild(msgDiv);
    });
  }

  function escapeHtml(text) { return String(text || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  window.togglePicker = function(id) {
    document.querySelectorAll('.emoji-picker-popup').forEach(p => {
      if (p.id !== `picker-${id}`) p.classList.remove('show');
    });
    const picker = document.getElementById(`picker-${id}`);
    if (picker) picker.classList.toggle('show');
  };

  // ЛИМИТ РЕАКЦИЙ С МГНОВЕННЫМ УДАЛЕНИЕМ
  window.handleReaction = function(id, emoji) {
    const voteKey = `voted_${id}_${emoji}`;
    const hasVoted = localStorage.getItem(voteKey) === 'true';

    let totalUserVotesOnMsg = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith(`voted_${id}_`) && localStorage.getItem(key) === 'true') {
        totalUserVotesOnMsg++;
      }
    }

    const msgRef = db.collection('messages').doc(id);

    db.runTransaction(async (transaction) => {
      const doc = await transaction.get(msgRef);
      if (!doc.exists) return;
      let reactions = doc.data().reactions || {};

      if (hasVoted) {
        reactions[emoji] = (reactions[emoji] || 1) - 1;
        if (reactions[emoji] <= 0) delete reactions[emoji];
        transaction.update(msgRef, { reactions });
        localStorage.removeItem(voteKey);
      } else {
        if (totalUserVotesOnMsg >= 3) throw new Error('LIMIT_REACHED');
        reactions[emoji] = (reactions[emoji] || 0) + 1;
        transaction.update(msgRef, { reactions });
        localStorage.setItem(voteKey, 'true');
      }
    }).catch(err => {
      if (err.message === 'LIMIT_REACHED' || err.toString().includes('LIMIT_REACHED')) {
        showToast('⚠️ Лимит исчерпан: можно поставить не более 3 реакций!');
      } else {
        console.error(err);
      }
    });

    document.querySelectorAll('.emoji-picker-popup').forEach(p => p.classList.remove('show'));
  };

  window.togglePin = function(id, newPinState) {
    if (!isAdmin) return;
    db.collection('messages').doc(id).update({ isPinned: newPinState }).then(() => {
      showToast(newPinState ? '📌 Сообщение закреплено сверху!' : '📍 Сообщение откреплено');
    });
  };

  window.deleteMessage = function(id, isPinned) {
    if (!isAdmin) {
      showToast('❌ Только администратор может удалять сообщения!');
      return;
    }
    if (isPinned) {
      showToast('⚠️ Сначала открепите важное сообщение, прежде чем удалять!');
      return;
    }
    db.collection('messages').doc(id).delete().then(() => {
        showToast('✓ Сообщение удалено');
    });
  };

  function postMessage() {
    const text = gbInput.value.trim();
    if (!text) return;

    let authorName = '';
    let isAdminPostFlag = false;

    if (isAdmin) {
      authorName = '@discoragen';
      isAdminPostFlag = true;
    } else {
      const randomNames = ['guest_99', 'cyber_user', 'anon_1337', 'player_one', 'user_52', 'visitor'];
      authorName = randomNames[Math.floor(Math.random() * randomNames.length)];
    }

    db.collection('messages').add({
      author: authorName,
      text: text,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: { '👍': 1 },
      isAdminPost: isAdminPostFlag,
      isPinned: false
    }).then(() => {
      gbInput.value = '';
    });
  }

  gbSendBtn.addEventListener('click', postMessage);
  gbInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') postMessage(); });

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAdminModal(); });
  adminPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAdminLogin(); });
  adminLoginModal.addEventListener('click', (e) => { if (e.target === adminLoginModal) closeAdminModal(); });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker-container')) {
      document.querySelectorAll('.emoji-picker-popup').forEach(p => p.classList.remove('show'));
    }
  });

  const statusDot = document.getElementById('statusDot');
  function updateOnlineStatus() {
    if (!navigator.onLine || document.hidden) {
      statusDot.classList.add('offline'); statusDot.title = 'Статус: Не в сети';
    } else {
      statusDot.classList.remove('offline'); statusDot.title = 'Статус: В сети';
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  document.addEventListener('visibilitychange', updateOnlineStatus);
  updateOnlineStatus();

  (function() {
    const fsBtn = document.getElementById('fullscreenBtn');
    const enterIcon = document.getElementById('enterFsIcon');
    const exitIcon = document.getElementById('exitFsIcon');
    function toggleFullscreen() {
      if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
      else { document.exitFullscreen(); }
    }
    function updateFsIcons() {
      const isFs = !!document.fullscreenElement;
      enterIcon.style.display = isFs ? 'none' : 'block';
      exitIcon.style.display = isFs ? 'block' : 'none';
    }
    if (fsBtn) fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', updateFsIcons);
  })();
</script>
</body>
</html>
