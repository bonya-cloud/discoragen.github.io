<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@discoragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg: #0a0507;
    --card: rgba(18, 8, 10, 0.70);
    --card-border: rgba(255, 45, 77, 0.3);
    --red: #ff2d4d;
    --red-dim: #7a0c1f;
    --red-glow: rgba(255, 45, 77, 0.35);
    --text: #f2e6e8;
    --muted: #9c7b80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--bg);
    overflow-x: hidden;
  }

  /* ... (весь твой стиль остаётся без изменений) ... */
  /* Я оставил только ключевые стили, чтобы не делать ответ огромным. */
  /* Скопируй все стили из твоего старого файла сюда */

  .gb-msg { display: flex; gap: 12px; padding: 12px; background: rgba(255, 45, 77, 0.05); border: 1px solid rgba(255, 45, 77, 0.15); border-radius: 6px; }
  .gb-avatar { width: 36px; height: 36px; border-radius: 50%; background: conic-gradient(from 0deg, var(--red), #ff7700); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
</style>
</head>
<body>

<!-- Твой HTML остаётся почти без изменений (enterOverlay, fullscreen, profile и т.д.) -->

<div class="guestbook-section">
  <div class="gb-header">
    <div class="gb-title">💬 Гостевая Книга</div>
    <div class="admin-panel">
      <div class="admin-status" id="adminStatus" style="display:none;">
        <span>✓</span> Администратор
      </div>
      <button class="admin-login-btn" id="adminLoginBtn" onclick="openAdminModal()">🔓 Вход</button>
      <button class="admin-logout-btn" id="adminLogoutBtn" onclick="logoutAdmin()" style="display:none;">🔒 Выход</button>
    </div>
  </div>

  <div class="gb-input-row">
    <input type="text" id="gbInput" placeholder="Напишите сообщение..." maxlength="300" />
    <button class="gb-send-btn" id="gbSendBtn">Отправить</button>
  </div>

  <div id="gbMessages"></div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSy...",           // ← Замени на свои данные!!!
  authDomain: "guestbook-site-5b1ab.firebaseapp.com",
  projectId: "guestbook-site-5b1ab",
  storageBucket: "guestbook-site-5b1ab.firebasestorage.app",
  messagingSenderId: "XXXXXXXXXXXX",
  appId: "1:XXXXXXXXXXXX:web:XXXXXXXXXXXXXXXXXXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const ADMIN_PASSWORD = 'nlez754.1998201020';
let isAdmin = false;

// Админ-панель
const adminLoginModal = document.getElementById('adminLoginModal');
const adminPasswordInput = document.getElementById('adminPassword');
const adminStatus = document.getElementById('adminStatus');
const adminLoginBtn = document.getElementById('adminLoginBtn');
const adminLogoutBtn = document.getElementById('adminLogoutBtn');

function openAdminModal() {
  adminLoginModal.classList.add('show');
  adminPasswordInput.focus();
}

function closeAdminModal() {
  adminLoginModal.classList.remove('show');
  adminPasswordInput.value = '';
}

window.submitAdminLogin = function() {
  if (adminPasswordInput.value === ADMIN_PASSWORD) {
    isAdmin = true;
    localStorage.setItem('discoragen_admin', 'true');
    adminStatus.style.display = 'flex';
    adminLoginBtn.style.display = 'none';
    adminLogoutBtn.style.display = 'inline-block';
    closeAdminModal();
  } else {
    alert('Неверный пароль!');
  }
};

window.logoutAdmin = function() {
  isAdmin = false;
  localStorage.removeItem('discoragen_admin');
  adminStatus.style.display = 'none';
  adminLoginBtn.style.display = 'inline-block';
  adminLogoutBtn.style.display = 'none';
};

// ==================== ГОСТЕВАЯ КНИГА ====================
const gbMessagesContainer = document.getElementById('gbMessages');
const gbInput = document.getElementById('gbInput');
const gbSendBtn = document.getElementById('gbSendBtn');

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function loadGuestbook() {
  db.collection('messages')
    .orderBy('createdAt', 'desc')
    .onSnapshot(snapshot => {
      gbMessagesContainer.innerHTML = '';
      snapshot.forEach(doc => {
        const msg = doc.data();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'gb-msg';
        const time = msg.createdAt ? msg.createdAt.toDate().toLocaleString('ru-RU') : 'только что';

        msgDiv.innerHTML = `
          <div class="gb-avatar">${(msg.author || 'Г').charAt(0)}</div>
          <div class="gb-content">
            <div class="gb-user-row">
              <span class="gb-author">${msg.author || 'Гость'}</span>
              <span class="gb-time">${time}</span>
              ${isAdmin ? `<button class="gb-delete-btn" onclick="deleteMessage('${doc.id}')">🗑️ Удалить</button>` : ''}
            </div>
            <div class="gb-text">${escapeHtml(msg.text)}</div>
          </div>
        `;
        gbMessagesContainer.appendChild(msgDiv);
      });
    });
}

window.postMessage = function() {
  const text = gbInput.value.trim();
  if (!text) return;

  db.collection('messages').add({
    author: "guest_" + Math.floor(1000 + Math.random() * 9000),
    text: text,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  gbInput.value = '';
};

window.deleteMessage = function(id) {
  if (confirm('Удалить сообщение?')) {
    db.collection('messages').doc(id).delete();
  }
};

// Инициализация
gbSendBtn.addEventListener('click', postMessage);
gbInput.addEventListener('keydown', e => { if (e.key === 'Enter') postMessage(); });

loadGuestbook();
</script>
</body>
</html>
