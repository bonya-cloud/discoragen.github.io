<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт на обновлении</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
        }
        h1 { font-size: 2.5em; }
        p { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Сайт временно недоступен</h1>
        <p>Мы проводим техническое обслуживание и обновления.<br>
        Скоро вернёмся, спасибо за понимание!</p>
        <p><small>Ориентировочное время: 1-2 часа</small></p>
    </div>
</body>
</html>
