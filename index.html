<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@discoragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<!-- Подключаем Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
  :root {
    --bg: #18191a;
    --card: rgba(32, 34, 37, 0.8);
    --card-border: rgba(255, 255, 255, 0.08);
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --accent-dim: #1e3a8a;
    --accent-glow: rgba(59, 130, 246, 0.3);
    --danger: #ef4444;
    --danger-bg: rgba(239, 68, 68, 0.12);
    --text: #f3f4f6;
    --muted: #9ca3af;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg);
  }
  ::-webkit-scrollbar-thumb {
    background: #374151;
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--accent);
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    position: relative;
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%233b82f6' stroke='%2318191a' stroke-width='1.5'/><circle cx='5' cy='5' r='1' fill='%23ffffff'/></svg>"), auto;
  }

  a, button, .play-btn, .progress-slider, .social-btn, .tag, .volume-slider, #enterOverlay, .visitor-count, .fullscreen-btn, .username, .game-plaque, .corner-volume, .location, .gb-send-btn, .reaction-btn, .gb-delete-btn, .picker-emoji-opt, .admin-login-btn, .admin-logout-btn {
    cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><path d='M2 2l16 7-6 3-3 6z' fill='%23ffffff' stroke='%233b82f6' stroke-width='1.5'/><circle cx='5' cy='5' r='1.5' fill='%233b82f6'/></svg>"), pointer;
  }

  .fullscreen-btn {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 100;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(20px);
    transition: all 0.2s ease;
    outline: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }

  .fullscreen-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-glow);
    transform: scale(1.05);
  }

  .fullscreen-btn svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: var(--text);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s ease;
  }

  .fullscreen-btn:hover svg {
    stroke: #ffffff;
  }

  .corner-volume {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 100;
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 50px;
    padding: 5px 8px 5px 5px;
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .corner-volume:hover {
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-glow);
  }

  .corner-volume-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(59, 130, 246, 0.12);
    border: 1px solid rgba(59, 130, 246, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    outline: none;
    flex-shrink: 0;
  }

  .corner-volume-btn svg {
    width: 13px;
    height: 13px;
    fill: var(--text);
    transition: fill 0.2s ease;
  }

  .corner-volume:hover .corner-volume-btn svg {
    fill: var(--accent);
  }

  .corner-volume-slider-wrap {
    max-width: 0;
    opacity: 0;
    overflow: hidden;
    white-space: nowrap;
    transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease, margin 0.3s ease;
    display: flex;
    align-items: center;
  }

  .corner-volume:hover .corner-volume-slider-wrap {
    max-width: 90px;
    opacity: 1;
    margin-left: 8px;
    margin-right: 2px;
  }

  .volume-slider {
    width: 80px;
    height: 4px;
    -webkit-appearance: none;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 2px;
    outline: none;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .volume-slider::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    background: #60a5fa;
  }

  #enterOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #111214;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }

  #enterOverlay.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .enter-ring {
    position: relative;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), #60a5fa, #93c5fd, var(--accent));
    animation: spinRing 1.8s linear infinite, pulseRing 1.2s ease-in-out infinite alternate;
    box-shadow: 0 0 25px rgba(59, 130, 246, 0.5), inset 0 0 15px rgba(96, 165, 250, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .enter-ring::before {
    content: '';
    position: absolute;
    inset: 4px;
    background: #111214;
    border-radius: 50%;
  }

  .enter-ring::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    background: #93c5fd;
    border-radius: 50%;
    box-shadow: 0 0 15px #60a5fa, 0 0 25px var(--accent);
    animation: coreFlicker 0.8s ease-in-out infinite alternate;
    z-index: 2;
  }

  @keyframes spinRing {
    to { transform: rotate(360deg); }
  }

  @keyframes pulseRing {
    0% { box-shadow: 0 0 25px rgba(59, 130, 246, 0.5), inset 0 0 15px rgba(96, 165, 250, 0.3); }
    100% { box-shadow: 0 0 40px rgba(96, 165, 250, 0.7), inset 0 0 25px rgba(59, 130, 246, 0.5); }
  }

  @keyframes coreFlicker {
    0% { opacity: 0.7; }
    100% { opacity: 1; }
  }

  .enter-text {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeInText 0.8s ease-out 0.3s backwards;
  }

  @keyframes fadeInText {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .main-container {
    max-width: 900px;
    width: 100%;
    z-index: 50;
  }

  .profile-section {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    margin-bottom: 20px;
  }

  .profile-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .profile-info {
    flex: 1;
  }

  .profile-avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, var(--accent), #60a5fa, var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 50px;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .username {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .user-status {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 10px #10b981;
    transition: all 0.3s ease;
  }

  .status-dot.offline {
    background: #ef4444;
    box-shadow: 0 0 10px #ef4444;
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .user-location {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .social-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .social-btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.08);
    color: var(--text);
    text-decoration: none;
    font-size: 12px;
    transition: all 0.2s ease;
  }

  .social-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 0 15px var(--accent-glow);
    color: #ffffff;
  }

  .activity-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .activity-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    backdrop-filter: blur(20px);
  }

  .activity-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .activity-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .guestbook-section {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 24px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  .gb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .gb-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .admin-panel {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .user-status-badge {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255, 255, 255, 0.05);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .user-status-badge.hidden {
    display: none;
  }

  .admin-status {
    font-size: 11px;
    color: #10b981;
    background: rgba(16, 185, 129, 0.1);
    padding: 4px 10px;
    border-radius: 12px;
    border: 1px solid rgba(16, 185, 129, 0.3);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .admin-status.hidden {
    display: none;
  }

  .admin-login-btn, .admin-logout-btn {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.12);
    color: var(--text);
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .admin-login-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    color: #ffffff;
  }

  .admin-logout-btn {
    background: rgba(16, 185, 129, 0.12);
    border-color: rgba(16, 185, 129, 0.3);
    color: #10b981;
  }

  .admin-logout-btn:hover {
    background: rgba(16, 185, 129, 0.25);
  }

  .admin-logout-btn.hidden {
    display: none;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.show {
    display: flex;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 32px;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .modal-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--text);
  }

  .modal-input {
    width: 100%;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: all 0.2s ease;
  }

  .modal-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .modal-buttons {
    display: flex;
    gap: 8px;
  }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 4px;
    border: 1px solid var(--card-border);
    background: rgba(59, 130, 246, 0.15);
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .modal-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    color: #ffffff;
  }

  .modal-btn-cancel {
    background: rgba(100, 100, 100, 0.2);
  }

  .modal-btn-cancel:hover {
    background: rgba(100, 100, 100, 0.4);
    border-color: var(--muted);
    color: var(--text);
    box-shadow: none;
  }

  .gb-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  #gbInput {
    flex: 1;
    padding: 10px 12px;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: all 0.2s ease;
  }

  #gbInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .gb-send-btn {
    padding: 10px 20px;
    background: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: #ffffff;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  .gb-send-btn:hover {
    background: var(--accent-hover);
    border-color: var(--accent-hover);
    box-shadow: 0 0 15px var(--accent-glow);
    transform: translateY(-1px);
  }

  #gbMessages {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 500px;
    overflow-y: auto;
    padding-right: 8px;
  }

  .gb-msg {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    transition: all 0.2s ease;
  }

  /* СТИЛИ ДЛЯ СООБЩЕНИЯ АДМИНА */
  .gb-msg.admin-post-style {
    background: rgba(59, 130, 246, 0.05);
    border: 1px solid rgba(59, 130, 246, 0.25);
  }

  .gb-msg.admin-post-style .gb-avatar {
    background: conic-gradient(from 0deg, var(--accent), #60a5fa);
    color: #ffffff;
    box-shadow: 0 0 10px var(--accent-glow);
  }

  .gb-msg.admin-post-style .gb-author {
    color: #60a5fa;
    text-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
  }

  .admin-badge {
    background: var(--accent);
    color: #ffffff;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    box-shadow: 0 0 10px var(--accent-glow);
    display: inline-block;
  }

  .gb-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
  }

  .gb-content {
    flex: 1;
    min-width: 0;
  }

  .gb-user-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .gb-author {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
  }

  .gb-time {
    font-size: 11px;
    color: var(--muted);
  }

  .gb-delete-btn {
    margin-left: auto;
    padding: 4px 8px;
    background: var(--danger-bg);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 3px;
    color: #f87171;
    font-size: 11px;
    transition: all 0.2s ease;
  }

  .gb-delete-btn:hover {
    background: rgba(239, 68, 68, 0.25);
    border-color: var(--danger);
    color: #ffffff;
  }

  .gb-delete-btn.hidden {
    display: none;
  }

  .gb-text {
    color: var(--text);
    font-size: 13px;
    margin-bottom: 8px;
    word-wrap: break-word;
  }

  .gb-reactions {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .reaction-btn {
    padding: 4px 8px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .reaction-btn:hover {
    background: rgba(59, 130, 246, 0.15);
    border-color: var(--accent);
  }

  .reaction-btn span {
    margin-left: 4px;
    font-size: 10px;
    color: var(--muted);
  }

  .emoji-picker-container {
    position: relative;
  }

  .emoji-picker-popup {
    position: absolute;
    bottom: 100%;
    left: 0;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    width: 150px;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: all 0.2s ease;
    pointer-events: none;
    margin-bottom: 4px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .emoji-picker-popup.show {
    max-height: 200px;
    opacity: 1;
    pointer-events: auto;
  }

  .picker-emoji-opt {
    width: 28px;
    height: 28px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .picker-emoji-opt:hover {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .error-toast {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(32, 34, 37, 0.95);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 12px;
    opacity: 0;
    transform: translateY(20px);
    pointer-events: none;
    transition: all 0.3s ease;
    z-index: 1001;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .error-toast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  @media (max-width: 600px) {
    body { padding: 20px 12px; }
    .profile-header { flex-direction: column; align-items: center; text-align: center; }
    .social-links { justify-content: center; }
    .activity-section { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="adminLoginModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">🔐 Вход в админ-панель</div>
    <input type="password" id="adminPassword" class="modal-input" placeholder="Введите пароль..." />
    <div class="modal-buttons">
      <button class="modal-btn" onclick="submitAdminLogin()">Вход</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">Отмена</button>
    </div>
  </div>
</div>

<div id="errorToast" class="error-toast"></div>

<button class="fullscreen-btn" id="fullscreenBtn">
  <svg id="enterFsIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
  </svg>
  <svg id="exitFsIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <path d="M8 8v-3h-3m18 0h-3v3m0 10h3v-3M3 8h3v3"/>
  </svg>
</button>

<div class="main-container">
  <div class="profile-section">
    <div class="profile-header">
      <div class="profile-avatar">🎮</div>
      <div class="profile-info">
        <div class="username" id="usernameEl">@discoragen</div>
        <div class="user-status">
          <div class="status-dot" id="statusDot"></div>
          <span class="status-text">Online</span>
        </div>
        <div class="user-location location">Yekaterinburg 🌐</div>
        <div class="social-links">
          <a href="https://t.me/Discoragen" class="social-btn">Telegram</a>
        </div>
      </div>
    </div>
  </div>

  <div class="activity-section">
    <div class="activity-card">
      <div class="activity-value visitor-count" id="visitorCount">506</div>
      <div class="activity-label">Посетители</div>
    </div>
    <div class="activity-card">
      <div class="activity-value">24</div>
      <div class="activity-label">Часов на сайте</div>
    </div>
    <div class="activity-card">
      <div class="activity-value" id="coolinessLevel">100</div>
      <div class="activity-label">Крутизна уровня</div>
    </div>
  </div>

  <div class="guestbook-section">
    <div class="gb-header">
      <div class="gb-title">💬 Гостевая Книга</div>
      <div class="admin-panel">
        <div class="user-status-badge" id="userStatusBadge">
          <span>👤</span> Статус: Пользователь
        </div>
        <div class="admin-status hidden" id="adminStatus">
          <span>✓</span> Администратор
        </div>
        <button class="admin-login-btn" id="adminLoginBtn" onclick="openAdminModal()">🔓 Вход</button>
        <button class="admin-logout-btn hidden" id="adminLogoutBtn" onclick="logoutAdmin()">🔒 Выход</button>
      </div>
    </div>

    <div class="gb-input-row">
      <input type="text" id="gbInput" class="gb-input" placeholder="Напишите сообщение..." maxlength="200" />
      <button class="gb-send-btn" id="gbSendBtn">Отправить</button>
    </div>

    <div id="gbMessages"></div>
  </div>
</div>

<script>
  // ИНИЦИАЛИЗАЦИЯ БАЗЫ ДАННЫХ FIREBASE
  const firebaseConfig = {
    apiKey: "AIzaSyDcgAxaEm0rKEbfL597920nX4fqgyD3BdE",
    authDomain: "guestbook-site-5b1ab.firebaseapp.com",
    projectId: "guestbook-site-5b1ab",
    storageBucket: "guestbook-site-5b1ab.firebasestorage.app",
    messagingSenderId: "593355741478",
    appId: "1:593355741478:web:472142384f1347cbabc9e7"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const ADMIN_PASSWORD = 'nlez754.1998201020';
  let isAdmin = false;
  let currentMessagesList = []; 

  const adminLoginModal = document.getElementById('adminLoginModal');
  const adminPassword = document.getElementById('adminPassword');
  const adminStatus = document.getElementById('adminStatus');
  const userStatusBadge = document.getElementById('userStatusBadge');
  const adminLoginBtn = document.getElementById('adminLoginBtn');
  const adminLogoutBtn = document.getElementById('adminLogoutBtn');
  const errorToast = document.getElementById('errorToast');
  const coolinessLevel = document.getElementById('coolinessLevel');
  const gbMessagesContainer = document.getElementById('gbMessages');
  const gbInput = document.getElementById('gbInput');
  const gbSendBtn = document.getElementById('gbSendBtn');

  // ЛОГИКА АДМИНКИ
  if (localStorage.getItem('discoragen_admin') === 'true') {
    isAdmin = true;
    adminStatus.classList.remove('hidden');
    userStatusBadge.classList.add('hidden');
    adminLoginBtn.classList.add('hidden');
    adminLogoutBtn.classList.remove('hidden');
    coolinessLevel.textContent = '∞';
  }

  window.openAdminModal = () => { adminLoginModal.classList.add('show'); adminPassword.focus(); };
  window.closeAdminModal = () => { adminLoginModal.classList.remove('show'); adminPassword.value = ''; };

  window.submitAdminLogin = function() {
    if (adminPassword.value === ADMIN_PASSWORD) {
      isAdmin = true;
      localStorage.setItem('discoragen_admin', 'true');
      adminStatus.classList.remove('hidden');
      userStatusBadge.classList.add('hidden');
      adminLoginBtn.classList.add('hidden');
      adminLogoutBtn.classList.remove('hidden');
      coolinessLevel.textContent = '∞';
      closeAdminModal();
      renderGuestbook(); 
      showToast('Добро пожаловать, администратор! 🔓');
    } else {
      showToast('❌ Неверный пароль!');
      adminPassword.value = '';
    }
  };

  window.logoutAdmin = function() {
    isAdmin = false;
    localStorage.removeItem('discoragen_admin');
    adminStatus.classList.add('hidden');
    userStatusBadge.classList.remove('hidden');
    adminLoginBtn.classList.remove('hidden');
    adminLogoutBtn.classList.add('hidden');
    coolinessLevel.textContent = '100';
    renderGuestbook();
    showToast('Вы вышли из админ-панели');
  };

  function showToast(message) {
    errorToast.textContent = message;
    errorToast.classList.add('show');
    setTimeout(() => errorToast.classList.remove('show'), 3000);
  }

  // СЛУШАЕМ БАЗУ ДАННЫХ В РЕАЛЬНОМ ВРЕМЕНИ
  db.collection('messages').onSnapshot((snapshot) => {
    currentMessagesList = [];
    snapshot.forEach(doc => {
      currentMessagesList.push({ id: doc.id, ...doc.data() });
    });
    // Сортировка по времени
    currentMessagesList.sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
    renderGuestbook();
  });

  // ОТРИСОВКА СООБЩЕНИЙ
  function renderGuestbook() {
    gbMessagesContainer.innerHTML = '';
    currentMessagesList.forEach((msg) => {
      const msgDiv = document.createElement('div');
      
      // Проверяем, от админа ли сообщение
      const isAdminPost = msg.isAdminPost === true;
      msgDiv.className = isAdminPost ? 'gb-msg admin-post-style' : 'gb-msg';

      let reactionsHTML = '';
      if (msg.reactions) {
        for (const [emoji, count] of Object.entries(msg.reactions)) {
          reactionsHTML += `<button class="reaction-btn" onclick="handleReaction('${msg.id}', '${emoji}')">${emoji} <span>${count}</span></button>`;
        }
      }

      const deleteButtonHTML = isAdmin ? `<button class="gb-delete-btn" onclick="deleteMessage('${msg.id}')" title="Удалить сообщение">🗑️ Удалить</button>` : '';
      const adminBadgeHTML = isAdminPost ? `<span class="admin-badge">👑 ADMIN</span>` : '';
      
      const avatarContent = isAdminPost ? '👑' : (msg.author || 'A')[0].toUpperCase();

      msgDiv.innerHTML = `
        <div class="gb-avatar">${avatarContent}</div>
        <div class="gb-content">
          <div class="gb-user-row">
            <span class="gb-author">${escapeHtml(msg.author)}</span>
            ${adminBadgeHTML}
            <span class="gb-time">${msg.time}</span>
            ${deleteButtonHTML}
          </div>
          <div class="gb-text">${escapeHtml(msg.text)}</div>
          <div class="gb-reactions">
            ${reactionsHTML}
            <div class="emoji-picker-container">
              <button class="reaction-btn" onclick="togglePicker('${msg.id}')">➕</button>
              <div class="emoji-picker-popup" id="picker-${msg.id}">
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '👍')">👍</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '❤️')">❤️</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '🔥')">🔥</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '💀')">💀</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '🚀')">🚀</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '⭐')">⭐</button>
                <button class="picker-emoji-opt" onclick="handleReaction('${msg.id}', '💯')">💯</button>
              </div>
            </div>
          </div>
        </div>
      `;
      gbMessagesContainer.appendChild(msgDiv);
    });
    gbMessagesContainer.scrollTop = gbMessagesContainer.scrollHeight;
  }

  function escapeHtml(text) { return String(text || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  window.togglePicker = function(id) {
    document.querySelectorAll('.emoji-picker-popup').forEach(p => {
      if (p.id !== `picker-${id}`) p.classList.remove('show');
    });
    const picker = document.getElementById(`picker-${id}`);
    if (picker) picker.classList.toggle('show');
  };

  // ОТПРАВКА РЕАКЦИИ В БАЗУ ДАННЫХ
  window.handleReaction = function(id, emoji) {
    db.collection('messages').doc(id).get().then(doc => {
      if (!doc.exists) return;
      let reactions = doc.data().reactions || {};
      reactions[emoji] = (reactions[emoji] || 0) + 1;
      db.collection('messages').doc(id).update({ reactions });
    });
  };

  // УДАЛЕНИЕ ИЗ БАЗЫ ДАННЫХ (если админ)
  window.deleteMessage = function(id) {
    if (!isAdmin) {
      showToast('❌ Только администратор может удалять сообщения!');
      return;
    }
    db.collection('messages').doc(id).delete().then(() => {
        showToast('✓ Сообщение удалено');
    });
  };

  // ОТПРАВКА СООБЩЕНИЯ В БАЗУ ДАННЫХ
  function postMessage() {
    const text = gbInput.value.trim();
    if (!text) return;

    let authorName = '';
    let isAdminPostFlag = false;

    if (isAdmin) {
      authorName = '@discoragen';
      isAdminPostFlag = true;
    } else {
      const randomNames = ['guest_99', 'cyber_user', 'anon_1337', 'player_one', 'user_52', 'visitor'];
      authorName = randomNames[Math.floor(Math.random() * randomNames.length)];
    }

    db.collection('messages').add({
      author: authorName,
      text: text,
      time: 'Только что',
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      reactions: { '👍': 1 },
      isAdminPost: isAdminPostFlag
    }).then(() => {
      gbInput.value = '';
    });
  }

  gbSendBtn.addEventListener('click', postMessage);
  gbInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') postMessage(); });

  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAdminModal(); });
  adminPassword.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitAdminLogin(); });
  adminLoginModal.addEventListener('click', (e) => { if (e.target === adminLoginModal) closeAdminModal(); });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.emoji-picker-container')) {
      document.querySelectorAll('.emoji-picker-popup').forEach(p => p.classList.remove('show'));
    }
  });

  const statusDot = document.getElementById('statusDot');
  function updateOnlineStatus() {
    if (!navigator.onLine || document.hidden) {
      statusDot.classList.add('offline'); statusDot.title = 'Статус: Не в сети';
    } else {
      statusDot.classList.remove('offline'); statusDot.title = 'Статус: В сети';
    }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  document.addEventListener('visibilitychange', updateOnlineStatus);
  updateOnlineStatus();

  (function() {
    const fsBtn = document.getElementById('fullscreenBtn');
    const enterIcon = document.getElementById('enterFsIcon');
    const exitIcon = document.getElementById('exitFsIcon');
    function toggleFullscreen() {
      if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
      else { document.exitFullscreen(); }
    }
    function updateFsIcons() {
      const isFs = !!document.fullscreenElement;
      enterIcon.style.display = isFs ? 'none' : 'block';
      exitIcon.style.display = isFs ? 'block' : 'none';
    }
    if (fsBtn) fsBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', updateFsIcons);
  })();
</script>
</body>
</html>
